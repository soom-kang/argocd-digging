apiVersion: batch/v1
kind: Job
metadata:
  name: sync-options-rerun-job
  namespace: study-sync-options
  annotations:
    argocd.argoproj.io/sync-options: Force=true,Replace=true
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: runner
          image: busybox:1.36
          command: ["sh", "-c", "echo '[sync-options] force/replace job run'; date"]
