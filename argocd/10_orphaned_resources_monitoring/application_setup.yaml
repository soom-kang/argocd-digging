apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: study-orphan-monitor
spec:
  description: Study project for orphaned resources monitoring
  sourceRepos:
    - https://github.com/soom-kang/argocd-digging.git
  destinations:
    - namespace: study-orphan-monitor
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  orphanedResources:
    warn: true
    ignore:
      - group: ""
        kind: ConfigMap
        name: kube-root-ca.crt
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: study-orphan-monitor-app
spec:
  project: study-orphan-monitor
  source:
    repoURL: https://github.com/soom-kang/argocd-digging.git
    targetRevision: main
    path: github/10_orphaned_resources_monitoring
  destination:
    server: https://kubernetes.default.svc
    namespace: study-orphan-monitor
