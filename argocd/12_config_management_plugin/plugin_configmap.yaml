apiVersion: v1
kind: ConfigMap
metadata:
  name: study-cmp-plugin
data:
  plugin.yaml: |
    apiVersion: argoproj.io/v1alpha1
    kind: ConfigManagementPlugin
    metadata:
      name: study-cmp
    spec:
      version: v1.0
      init:
        command: [sh, -c]
        args:
          - |
            test -f plugin-input.env
      generate:
        command: [sh, -c]
        args:
          - |
            set -eu
            message=""
            color=""

            while IFS='=' read -r key value; do
              case "$key" in
                MESSAGE) message="$value" ;;
                COLOR) color="$value" ;;
              esac
            done < plugin-input.env

            if [ -z "$message" ] || [ -z "$color" ]; then
              echo "plugin-input.env must contain MESSAGE and COLOR" >&2
              exit 1
            fi

            suffix="${ARGOCD_ENV_MESSAGE_SUFFIX:-from-plugin-default}"

            cat <<EOF
            apiVersion: v1
            kind: ConfigMap
            metadata:
              name: cmp-generated-config
              namespace: ${ARGOCD_APP_NAMESPACE}
              labels:
                app.kubernetes.io/name: ${ARGOCD_APP_NAME}
                app.kubernetes.io/part-of: argocd-study
                study.argocd/topic: config-management-plugin
            data:
              message: "${message} ${suffix}"
              color: "${color}"
              generated-by: "config-management-plugin"
            EOF
      discover:
        fileName: "./plugin-input.env"
      preserveFileMode: false
      provideGitCreds: false
