spec:
  template:
    spec:
      containers:
        - name: study-cmp
          image: busybox:1.36.1
          imagePullPolicy: IfNotPresent
          command:
            - /var/run/argocd/argocd-cmp-server
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
          volumeMounts:
            - mountPath: /var/run/argocd
              name: var-files
            - mountPath: /home/argocd/cmp-server/plugins
              name: plugins
            - mountPath: /home/argocd/cmp-server/config/plugin.yaml
              name: study-cmp-plugin
              subPath: plugin.yaml
              readOnly: true
            - mountPath: /tmp
              name: study-cmp-tmp
      volumes:
        - name: study-cmp-plugin
          configMap:
            name: study-cmp-plugin
        - name: study-cmp-tmp
          emptyDir: {}
